<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vantage — AI Visibility</title>
<style>
  :root{
    --bg:#EBEEF4; --panel:#FFFFFF; --panel-2:#F5F7FB; --border:#E0E5EE;
    --text:#141A26; --muted:#5E6880; --faint:#8A93A6;
    --accent:#4E5FE0; --accent-weak:rgba(78,95,224,.11); --accent-line:rgba(78,95,224,.28);
    --pos:#1F9D6B; --pos-weak:rgba(31,157,107,.13);
    --neu:#B7842A; --neu-weak:rgba(183,132,42,.14);
    --neg:#CF4B44; --neg-weak:rgba(207,75,68,.13);
    --s1:#4E5FE0; --s2:#17A79A; --s3:#D79A3C; --s4:#D2698C; --s5:#6E7A93;
    --shadow:0 1px 2px rgba(20,26,38,.05), 0 6px 20px rgba(20,26,38,.05);
    --font-sans:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",system-ui,sans-serif;
    --font-mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --r:12px;
  }
  @media (prefers-color-scheme:dark){:root{
    --bg:#0C111B; --panel:#151C29; --panel-2:#1B2433; --border:#293244;
    --text:#E7ECF5; --muted:#95A0B4; --faint:#6B7589;
    --accent:#7182F4; --accent-weak:rgba(113,130,244,.16); --accent-line:rgba(113,130,244,.36);
    --pos:#37B98A; --pos-weak:rgba(55,185,138,.16);
    --neu:#D6A64B; --neu-weak:rgba(214,166,75,.15);
    --neg:#E5675E; --neg-weak:rgba(229,103,94,.16);
    --s1:#7182F4; --s2:#2BC0B0; --s3:#E0AE55; --s4:#E482A0; --s5:#8592AB;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.28);
  }}
  :root[data-theme="light"]{
    --bg:#EBEEF4; --panel:#FFFFFF; --panel-2:#F5F7FB; --border:#E0E5EE;
    --text:#141A26; --muted:#5E6880; --faint:#8A93A6;
    --accent:#4E5FE0; --accent-weak:rgba(78,95,224,.11); --accent-line:rgba(78,95,224,.28);
    --pos:#1F9D6B; --pos-weak:rgba(31,157,107,.13); --neu:#B7842A; --neu-weak:rgba(183,132,42,.14);
    --neg:#CF4B44; --neg-weak:rgba(207,75,68,.13);
    --s1:#4E5FE0; --s2:#17A79A; --s3:#D79A3C; --s4:#D2698C; --s5:#6E7A93;
    --shadow:0 1px 2px rgba(20,26,38,.05), 0 6px 20px rgba(20,26,38,.05);
  }
  :root[data-theme="dark"]{
    --bg:#0C111B; --panel:#151C29; --panel-2:#1B2433; --border:#293244;
    --text:#E7ECF5; --muted:#95A0B4; --faint:#6B7589;
    --accent:#7182F4; --accent-weak:rgba(113,130,244,.16); --accent-line:rgba(113,130,244,.36);
    --pos:#37B98A; --pos-weak:rgba(55,185,138,.16); --neu:#D6A64B; --neu-weak:rgba(214,166,75,.15);
    --neg:#E5675E; --neg-weak:rgba(229,103,94,.16);
    --s1:#7182F4; --s2:#2BC0B0; --s3:#E0AE55; --s4:#E482A0; --s5:#8592AB;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.28);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);
    -webkit-font-smoothing:antialiased;line-height:1.45;font-size:14px}
  .tnum{font-variant-numeric:tabular-nums}
  button{font-family:inherit;cursor:pointer}
  a{color:inherit;text-decoration:none}
  .app{display:grid;grid-template-columns:232px 1fr;min-height:100vh}
  .side{background:var(--panel);border-right:1px solid var(--border);display:flex;
    flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
  .brand{display:flex;align-items:center;gap:10px;padding:18px 18px 14px}
  .brand .mark{width:26px;height:26px;border-radius:7px;background:var(--accent);
    display:grid;place-items:center;color:#fff;flex:none;box-shadow:0 2px 8px var(--accent-line)}
  .brand .mark svg{width:15px;height:15px}
  .brand b{font-size:15px;letter-spacing:.02em}
  .brand span{display:block;font-size:10.5px;color:var(--faint);letter-spacing:.13em;text-transform:uppercase;margin-top:1px}
  .navsec{padding:6px 12px}
  .navlbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);padding:12px 10px 6px}
  .navitem{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;
    color:var(--muted);font-size:13.5px;font-weight:500;width:100%;border:none;background:none;text-align:left}
  .navitem svg{width:16px;height:16px;opacity:.85;flex:none}
  .navitem:hover{background:var(--panel-2);color:var(--text)}
  .navitem.active{background:var(--accent-weak);color:var(--accent);font-weight:600}
  .navitem .badge{margin-left:auto;font-size:10.5px;color:var(--faint);font-weight:500}
  .side .who{margin-top:auto;padding:14px 16px;border-top:1px solid var(--border);
    display:flex;align-items:center;gap:10px;font-size:12px;color:var(--muted)}
  .side .who .av{width:28px;height:28px;border-radius:50%;background:var(--accent);
    display:grid;place-items:center;font-weight:700;color:#fff;flex:none}
  .side .who .out{margin-left:auto;color:var(--faint);font-size:11.5px;font-weight:600;background:none;border:none}
  .side .who .out:hover{color:var(--neg)}
  .main{min-width:0;display:flex;flex-direction:column}
  .topbar{position:sticky;top:0;z-index:5;background:color-mix(in srgb,var(--bg) 82%,transparent);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;padding:14px 26px;flex-wrap:wrap}
  .crumb{font-size:12.5px;color:var(--faint)}
  .crumb b{color:var(--text);font-weight:600}
  .crumb a{cursor:pointer}
  .h1{font-size:19px;font-weight:650;letter-spacing:-.01em;text-wrap:balance}
  .spacer{flex:1}
  .btn{display:inline-flex;align-items:center;gap:7px;background:var(--accent);color:#fff;border:none;
    border-radius:9px;padding:8px 14px;font-size:13px;font-weight:600;box-shadow:0 2px 10px var(--accent-line)}
  .btn.ghost{background:var(--panel);color:var(--text);border:1px solid var(--border);box-shadow:none}
  .btn:disabled{opacity:.55;cursor:default}
  .btn svg{width:15px;height:15px}
  .btn.danger{background:var(--neg);color:#fff;box-shadow:none}
  .btn.danger:hover{filter:brightness(.94)}
  .rowbtn{width:28px;height:28px;border-radius:7px;border:1px solid transparent;background:none;color:var(--faint);display:inline-grid;place-items:center}
  .rowbtn:hover{color:var(--neg);background:var(--neg-weak);border-color:var(--neg-weak)}
  .rowbtn svg{width:15px;height:15px}
  .seg{display:inline-flex;background:var(--panel-2);border:1px solid var(--border);border-radius:9px;padding:2px}
  .seg button{border:none;background:none;color:var(--muted);font-size:12px;font-weight:600;padding:5px 10px;border-radius:7px}
  .seg button.on{background:var(--panel);color:var(--text);box-shadow:var(--shadow)}
  .fsel{font-family:inherit;font-size:12.5px;font-weight:500;color:var(--text);background:var(--panel);border:1px solid var(--border);border-radius:9px;padding:7px 9px;cursor:pointer}
  .catchip{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.05em}
  /* kanban */
  .kboard{display:flex;gap:14px;overflow-x:auto;padding-bottom:10px;align-items:flex-start}
  .kcol{flex:0 0 268px;display:flex;flex-direction:column;gap:10px}
  .kcolhd{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:700;padding:2px 2px 4px}
  .kcolhd .dot{width:9px;height:9px;border-radius:50%;flex:none}
  .kcolhd .ct{margin-left:auto;font-size:11px;color:var(--faint);font-weight:600;background:var(--panel-2);border-radius:20px;padding:1px 8px}
  .kcard{background:var(--panel);border:1px solid var(--border);border-radius:11px;padding:12px 13px;box-shadow:var(--shadow);cursor:pointer;transition:border-color .12s,transform .12s;display:flex;flex-direction:column;gap:8px}
  .kcard:hover{border-color:var(--accent-line);transform:translateY(-1px)}
  .kcard .kmeta{display:flex;align-items:center;gap:7px}
  .kcard .ktitle{font-size:13px;font-weight:600;line-height:1.35}
  .kcard .kfoot{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--faint)}
  .kcard .kbtns{display:flex;gap:6px;margin-top:2px}
  .prio{display:inline-flex;align-items:flex-end;gap:2px;height:12px}
  .prio i{width:3px;border-radius:1px;background:var(--border)}
  .prio i.on{background:var(--pr)}
  .kcolempty{font-size:11.5px;color:var(--faint);border:1px dashed var(--border);border-radius:10px;padding:14px;text-align:center}
  /* action detail modal */
  .modal-wide{width:min(780px,96vw)!important}
  .adet-hd{display:flex;align-items:flex-start;gap:12px;margin-bottom:16px}
  .adet-hd .x{flex:none;width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--panel);color:var(--muted);display:grid;place-items:center}
  .adet-hd h2{font-size:18px;margin:0;line-height:1.3}
  .adet-hd .sub{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);margin-top:4px}
  .adet-meta{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:16px}
  .adet-meta .k{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);font-weight:600}
  .adet-meta .v{font-size:13.5px;font-weight:600;margin-top:5px}
  .adet-sec{border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px}
  .adet-sec.accent{border-left:3px solid var(--pos)}
  .adet-lab{display:flex;align-items:center;gap:8px;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);font-weight:700;margin:14px 0 8px}
  .adet-must{display:flex;gap:10px;align-items:flex-start;font-size:13px;line-height:1.5;margin:8px 0}
  .adet-must svg{width:16px;height:16px;color:var(--pos);flex:none;margin-top:2px}
  .adet-src{display:flex;gap:8px;font-size:12.5px;padding:6px 0;align-items:baseline}
  .adet-src a{color:var(--accent);font-weight:550;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .adet-src .n{margin-left:auto;color:var(--faint);font-weight:600;white-space:nowrap;font-size:11.5px}
  .cmt{display:flex;gap:10px;padding:11px 0;border-top:1px solid var(--border)}
  .cmt .av{width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;display:grid;place-items:center;font-weight:700;font-size:11px;flex:none}
  .cmt .who{font-size:12px;font-weight:600}
  .cmt .when{font-size:11px;color:var(--faint);margin-left:6px}
  .cmt .body{font-size:13px;color:var(--text);margin-top:3px;line-height:1.5;white-space:pre-wrap}
  .cmtbox{display:flex;gap:9px;margin-top:12px}
  .cmtbox textarea{flex:1;font-family:inherit;font-size:13px;border:1px solid var(--border);border-radius:10px;padding:9px 11px;background:var(--panel-2);color:var(--text);resize:vertical;min-height:44px}
  .content{padding:22px 26px 60px;max-width:1280px;width:100%}
  .grid{display:grid;gap:16px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow)}
  .card .hd{display:flex;align-items:center;gap:10px;padding:15px 18px 0}
  .card .hd h3{font-size:14px;font-weight:650;margin:0}
  .card .hd p{font-size:12px;color:var(--faint);margin:2px 0 0}
  .card .bd{padding:14px 18px 18px}
  .eyebrow{font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--faint);font-weight:600}
  .tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  .tile{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);
    padding:16px 17px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .tile .lab{font-size:11.5px;color:var(--muted);font-weight:550}
  .tile .val{font-size:30px;font-weight:680;letter-spacing:-.02em;margin-top:9px;line-height:1}
  .tile .sub{font-size:11.5px;color:var(--faint);margin-top:7px}
  .tile .strip{position:absolute;left:0;top:0;bottom:0;width:3px}
  .chip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap}
  .chip.pos{color:var(--pos);background:var(--pos-weak)}
  .chip.neu{color:var(--neu);background:var(--neu-weak)}
  .chip.neg{color:var(--neg);background:var(--neg-weak)}
  .chip.off{color:var(--faint);background:var(--panel-2)}
  .chip.dot::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
  table{width:100%;border-collapse:collapse}
  th{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);font-weight:600;text-align:left;padding:0 12px 9px}
  td{padding:11px 12px;border-top:1px solid var(--border);font-size:13px;vertical-align:middle}
  tr td:first-child,th:first-child{padding-left:4px}
  .rank{color:var(--faint);font-weight:600;width:26px}
  .brandcell{display:flex;align-items:center;gap:9px;font-weight:600}
  .lg{border-radius:6px;display:grid;place-items:center;font-size:10px;font-weight:800;color:#fff;flex:none;width:22px;height:22px}
  tr.me td{background:var(--accent-weak)}
  tr.me .brandcell{color:var(--accent)}
  .bar{height:6px;border-radius:4px;background:var(--panel-2);overflow:hidden;min-width:60px}
  .bar>i{display:block;height:100%;border-radius:4px;background:var(--accent)}
  .modelbadge{display:inline-flex;align-items:center;gap:6px;font-weight:600;font-size:12.5px}
  .modelbadge .m{width:19px;height:19px;border-radius:5px;display:grid;place-items:center;font-size:10px;font-weight:800;color:#fff}
  .ans{border:1px solid var(--border);border-radius:10px;padding:13px 14px;background:var(--panel-2);display:flex;flex-direction:column;gap:8px}
  .ans+.ans{margin-top:10px}
  .ans .top{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .ans .pr{font-weight:600;font-size:13px}
  .ans .txt{font-size:12.5px;color:var(--muted);line-height:1.5}
  .ans .meta{font-size:11px;color:var(--faint);margin-left:auto}
  .srcline{display:flex;align-items:center;gap:8px;padding:9px 4px;border-top:1px solid var(--border)}
  .srcline:first-child{border-top:none}
  .srcline .fav{width:20px;height:20px;border-radius:5px;background:var(--panel-2);border:1px solid var(--border);display:grid;place-items:center;font-size:10px;font-weight:700;color:var(--muted)}
  .srcline .dom{font-size:12.5px;font-weight:550;flex:none;width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .srcline .pct{margin-left:auto;font-size:12px;color:var(--muted);font-weight:600;width:44px;text-align:right}
  .urlrow{display:flex;align-items:center;gap:9px;padding:9px 4px;border-top:1px solid var(--border)}
  .urlrow:first-child{border-top:none}
  .urlrow .fav{width:20px;height:20px;flex:none;border-radius:5px;background:var(--panel-2);border:1px solid var(--border);display:grid;place-items:center;font-size:10px;font-weight:700;color:var(--muted)}
  .urllink{flex:1;min-width:0;display:flex;flex-direction:column;line-height:1.3}
  .urllink b{font-size:12.5px;font-weight:600;color:var(--text)}
  .urllink span{font-size:11px;color:var(--faint);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .urllink:hover b{color:var(--accent)}
  .note{font-size:11.5px;color:var(--faint);display:flex;align-items:center;gap:7px;padding:9px 12px;border:1px dashed var(--border);border-radius:9px;background:var(--panel-2)}
  .note svg{width:14px;height:14px;flex:none}
  .clientgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
  .ccard{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:16px;
    box-shadow:var(--shadow);text-align:left;width:100%;display:flex;flex-direction:column;gap:13px;transition:transform .12s,border-color .12s}
  .ccard:hover{transform:translateY(-2px);border-color:var(--accent-line)}
  .ccard .row1{display:flex;align-items:center;gap:11px}
  .ccard .row1 .lg{width:38px;height:38px;border-radius:9px;font-size:14px}
  .ccard .nm{font-weight:650;font-size:14.5px}
  .ccard .tag{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:20px;margin-top:2px;display:inline-block}
  .ccard .stats{display:flex;gap:18px;padding-top:11px;border-top:1px solid var(--border)}
  .ccard .stat .k{font-size:10.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.06em}
  .ccard .stat .v{font-size:17px;font-weight:680;margin-top:3px}
  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:2px;flex-wrap:wrap}
  .tab{border:none;background:none;color:var(--muted);font-size:13.5px;font-weight:550;padding:10px 13px;border-bottom:2px solid transparent;margin-bottom:-1px}
  .tab.on{color:var(--text);border-color:var(--accent);font-weight:650}
  .tab:hover{color:var(--text)}
  .hide{display:none!important}
  .promptgroup{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);font-weight:650;padding:14px 4px 6px}
  tr.clk{cursor:pointer}
  tr.clk:hover td{background:var(--panel-2)}
  .viewcue{font-size:11px;color:var(--accent);font-weight:600;display:inline-flex;align-items:center;gap:3px}
  .viewcue svg{width:12px;height:12px}
  .legend{display:flex;flex-wrap:wrap;gap:14px;font-size:11.5px;color:var(--muted);font-weight:550}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .legend i{width:10px;height:10px;border-radius:3px;flex:none}
  .mscore{display:grid;grid-template-columns:repeat(auto-fit,minmax(168px,1fr));gap:12px;margin-bottom:18px}
  .mtile{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:14px;box-shadow:var(--shadow);position:relative}
  .mtile .mt-top{display:flex;align-items:center;gap:8px;margin-bottom:9px}
  .mtile .mt-vis{font-size:26px;font-weight:680;letter-spacing:-.02em;line-height:1}
  .mtile .mt-sub{font-size:11.5px;color:var(--faint);margin-top:5px}
  .mtile .mt-tag{position:absolute;top:12px;right:12px;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:2px 7px;border-radius:20px}
  .mread-lab{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);font-weight:700;margin-bottom:5px}
  .mread-txt{font-size:13.5px;line-height:1.6;color:var(--text)}
  /* drawer */
  .drawer{position:fixed;inset:0;z-index:60}
  .drawer.hide{display:none}
  .drawer-bg{position:absolute;inset:0;background:rgba(8,12,20,.5);backdrop-filter:blur(2px)}
  .drawer-panel{position:absolute;top:0;right:0;height:100%;width:min(620px,94vw);background:var(--bg);
    border-left:1px solid var(--border);box-shadow:-12px 0 40px rgba(0,0,0,.25);display:flex;flex-direction:column;animation:slidein .2s ease}
  @keyframes slidein{from{transform:translateX(30px);opacity:.6}to{transform:none;opacity:1}}
  @media (prefers-reduced-motion:reduce){.drawer-panel{animation:none}}
  .drawer-hd{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:14px;background:var(--panel)}
  .drawer-hd .q{font-size:16px;font-weight:650;letter-spacing:-.01em}
  .drawer-hd .sub{font-size:12px;color:var(--faint);margin-top:4px}
  .drawer-x{margin-left:auto;flex:none;width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--panel);color:var(--muted);display:grid;place-items:center}
  .drawer-x svg{width:16px;height:16px}
  .drawer-bd{flex:1 1 auto;min-height:0;overflow-y:auto;overscroll-behavior:contain;padding:18px 22px 40px;display:flex;flex-direction:column;gap:16px}
  .acard{border:1px solid var(--border);border-radius:12px;background:var(--panel);overflow:hidden;flex:0 0 auto}
  .acard-hd{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap}
  .atext{padding:4px 18px 8px;font-size:13.5px;line-height:1.6;color:var(--text)}

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://fqvcsegmfxfmozqkgbtg.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZxdmNzZWdtZnhmbW96cWtnYnRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ3NDAxMDEsImV4cCI6MjEwMDMxNjEwMX0.4HPwvxH3itnBk1H1ApykX43ifqhFZ76cwZh7MH4USGs';
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

const PALETTE = ['#4E5FE0','#17A79A','#D79A3C','#D2698C','#6E7A93','#3B7D5B','#8A5AD1','#C0562E'];
const state = { clients:[], prompts:[], results:[], actions:[], suggestions:[], perception:[], srcMentions:{}, view:'clients', clientId:null, tab:'overview', running:false, promptText:'', windowDays:7, modelFilter:'all', genRunning:false, insightsRunning:false, openActionId:null, userEmail:'' };
const clientSuggestions = cid => (state.suggestions||[]).filter(s=>s.client_id===cid);
const clientPerception = cid => (state.perception||[]).find(p=>p.client_id===cid);
const CANON_MODELS = ['openai','anthropic','perplexity','gemini','aio'];
const LIVE_MODELS = ['openai','anthropic','perplexity','gemini']; // platforms with API keys configured (aio not yet built)

const $ = id => document.getElementById(id);
const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}
function initials(n){return (n||'?').replace(/[^A-Za-z0-9 ]/g,'').split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase()||n.slice(0,2).toUpperCase();}
function colorFor(s){let h=0;for(const c of (s||'')){h=(h*31+c.charCodeAt(0))>>>0;}return PALETTE[h%PALETTE.length];}
const MB = m => m==='openai'?{n:'ChatGPT',c:'#10A37F',i:'G'}:m==='anthropic'?{n:'Claude',c:'#D97757',i:'C'}:m==='perplexity'?{n:'Perplexity',c:'#20808D',i:'P'}:m==='gemini'?{n:'Gemini',c:'#4285F4',i:'G'}:m==='aio'?{n:'Google AI Overviews',c:'#4285F4',i:'A'}:{n:m,c:'#6E7A93',i:'?'};
const SENTCHIP = s => s==='positive'?['pos','Positive']:s==='neutral'?['neu','Neutral']:s==='negative'?['neg','Negative']:['off','No mention'];
// Group rows into { key -> [rows] } by a field name.
function groupBy(rows, key){ const m={}; rows.forEach(r=>{ (m[r[key]]=m[r[key]]||[]).push(r); }); return m; }

// ---------- AUTH ----------
window.sendLink = async function(){
  const email=$('authEmail').value.trim();
  if(!email){ $('authMsg').textContent='Enter your email.'; return; }
  $('authBtn').disabled=true; $('authMsg').textContent='Sending…';
  const redirect = location.href.split('#')[0];
  const { error } = await sb.auth.signInWithOtp({ email, options:{ emailRedirectTo: redirect } });
  $('authBtn').disabled=false;
  $('authMsg').textContent = error ? ('Error: '+error.message) : 'Check your email for the sign-in link.';
};
window.signOut = async function(){ await sb.auth.signOut(); location.reload(); };

// ---------- DATA ----------
async function loadAll(){
  const [c,p,r,a,sg,pc,sm] = await Promise.all([
    sb.from('clients').select('*').order('created_at'),
    sb.from('prompts').select('*'),
    sb.from('results').select('*').order('run_date',{ascending:false}),
    sb.from('actions').select('*').order('created_at',{ascending:false}),
    sb.from('prompt_suggestions').select('*').order('volume',{ascending:false}),
    sb.from('perception').select('*'),
    sb.from('source_mentions').select('*'),
  ]);
  if(c.error||p.error||r.error){ toast('Load error: '+((c.error||p.error||r.error).message)); }
  state.clients=c.data||[]; state.prompts=p.data||[]; state.results=r.data||[]; state.actions=a.data||[];
  state.suggestions=sg.data||[]; state.perception=pc.data||[];
  state.srcMentions={}; (sm.data||[]).forEach(x=>{ state.srcMentions[x.url]=x.brands||[]; });
}
const clientResults = cid => state.results.filter(r=>r.client_id===cid);
const clientPrompts = cid => state.prompts.filter(p=>p.client_id===cid);
const clientActions = cid => (state.actions||[]).filter(a=>a.client_id===cid);
// results after applying the active model filter (used by all detail views)
function viewResults(cid){ const rs=clientResults(cid);
  return state.modelFilter==='all'? rs : rs.filter(r=>r.model===state.modelFilter); }
function clientModels(cid){ return [...new Set(clientResults(cid).map(r=>r.model))]; }
function latestRows(cid){
  const rs=viewResults(cid); if(!rs.length) return [];
  const d=rs.reduce((m,r)=>r.run_date>m?r.run_date:m, rs[0].run_date);
  return rs.filter(r=>r.run_date===d);
}
function maxDate(cid){ const rs=viewResults(cid); return rs.length? rs.reduce((m,r)=>r.run_date>m?r.run_date:m, rs[0].run_date):null; }
function shiftDate(iso, deltaDays){ const [y,mo,d]=iso.split('-').map(Number);
  const dt=new Date(Date.UTC(y,mo-1,d)); dt.setUTCDate(dt.getUTCDate()+deltaDays); return dt.toISOString().slice(0,10); }
function windowRows(cid, days){ const md=maxDate(cid); if(!md) return [];
  const start=shiftDate(md, -(days-1)); return viewResults(cid).filter(r=>r.run_date>=start && r.run_date<=md); }
function promptKind(cid, text){
  const p=clientPrompts(cid).find(x=>x.text===text);
  return p?p.kind:'unbranded';
}
function sentLabelOf(sc){
  const t=sc.positive+sc.neutral+sc.negative;
  if(!t) return 'No data';
  if(sc.positive&&sc.negative) return 'Mixed';
  if(sc.positive>=sc.negative && sc.positive>=sc.neutral) return 'Positive';
  if(sc.negative>sc.positive) return 'Negative';
  return 'Mixed';
}
function summary(cid){
  const W=state.windowDays;
  const rows=windowRows(cid,W);   // rolling window (7/14/30 days)
  const client=state.clients.find(c=>c.id===cid);
  // VISIBILITY / MENTIONS use UNBRANDED (buyer-intent) prompts only. Branded prompts
  // ("is X good?") almost always name the client, so counting them inflates the number.
  const unb=rows.filter(r=>promptKind(cid,r.prompt_text)!=='branded');
  const branded=rows.filter(r=>promptKind(cid,r.prompt_text)==='branded');
  const unbMent=unb.filter(r=>r.client_mentioned).length;
  // share of voice among unbranded (shared definition with Competitor Analysis)
  const brandCount={};
  for(const r of unb){
    const brands=new Set([...(r.other_brands||[]),...(r.competitors_mentioned||[])]);
    if(r.client_mentioned && client) brands.add(client.name);
    for(const b of brands) brandCount[b]=(brandCount[b]||0)+1;
  }
  const board=Object.entries(brandCount).map(([n,c])=>({n,c})).sort((a,b)=>b.c-a.c);
  const denom=unb.length||1;
  let rank=board.findIndex(b=>client&&b.n===client.name); rank = rank<0?null:rank+1;
  const totalBrands=board.length;
  // sentiment: branded = direct reputation ("what they say when asked about you");
  // unbranded-when-mentioned = how you're portrayed when you surface in buyer searches.
  const tally=list=>{ const sc={positive:0,neutral:0,negative:0}; list.forEach(r=>{ if(r.sentiment&&sc[r.sentiment]!=null) sc[r.sentiment]++; }); return sc; };
  const bsc=tally(branded);
  const usc=tally(unb.filter(r=>r.client_mentioned));
  // trend: unbranded visibility this window vs the prior window of equal length
  const md=maxDate(cid);
  let prevVis=null;
  if(md){
    const ps=shiftDate(md,-(2*W-1)), pe=shiftDate(md,-W);
    const pu=viewResults(cid).filter(r=>r.run_date>=ps && r.run_date<=pe && promptKind(cid,r.prompt_text)!=='branded');
    prevVis = pu.length? Math.round(pu.filter(r=>r.client_mentioned).length/pu.length*100):null;
  }
  const dayCount=new Set(rows.map(r=>r.run_date)).size;
  return {
    unbTotal: unb.length, unbMent, vis: unb.length?Math.round(unbMent/unb.length*100):0,
    board, denom, rank, totalBrands,
    bsc, bSentLabel: sentLabelOf(bsc), brandedCount: branded.length,
    usc, uSentLabel: sentLabelOf(usc),
    promptCount: clientPrompts(cid).length, dayCount, windowEnd: md, prevVis,
  };
}

function linkIcon(){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10 13a5 5 0 0 0 7 0l2-2a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-2 2a5 5 0 0 0 7 7l1-1"/></svg>';}
function chatIcon(){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 12a8 8 0 0 1-11.5 7.2L3 21l1.8-6.5A8 8 0 1 1 21 12z"/></svg>';}
function boltIcon(){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M13 2L4.5 13.5H11l-1 8.5 8.5-11.5H12l1-8.5z"/></svg>';}
function compassIcon(){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M15.5 8.5l-2 5-5 2 2-5z"/></svg>';}
function eyeIcon2(){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>';}

// ---------- RENDER: clients ----------
function renderClients(){
  $('topbar').innerHTML = `<div><div class="crumb">Workspace</div><div class="h1">Clients</div></div>
    <div class="spacer"></div>
    <button class="btn ghost" onclick="loadAndRender()">Refresh</button>
    <button class="btn" onclick="addClientModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12h14"/></svg>Add client</button>`;
  if(!state.clients.length){
    $('content').innerHTML = `<div class="note" style="max-width:520px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/></svg>No clients yet. Click "Add client" to start tracking one. The daily run picks it up automatically.</div>`;
    return;
  }
  const cards = state.clients.map(c=>{
    const s=summary(c.id);
    const tagc = c.status==='pitch'?'var(--faint)':'var(--pos)';
    return `<button class="ccard" onclick="openClient('${c.id}')">
      <div class="row1"><span class="lg" style="background:${colorFor(c.name)}">${esc(initials(c.name))}</span>
        <div><div class="nm">${esc(c.name)}</div><span class="tag" style="color:${tagc};background:color-mix(in srgb,${tagc} 14%,transparent)">${esc(c.status)}</span></div></div>
      <div class="stats">
        <div class="stat"><div class="k">Visibility</div><div class="v tnum">${s.unbTotal?s.vis+'%':'—'}</div></div>
        <div class="stat"><div class="k">SoV rank</div><div class="v tnum">${s.rank?('#'+s.rank):'—'}</div></div>
        <div class="stat"><div class="k">Prompts</div><div class="v tnum">${s.promptCount}</div></div>
      </div></button>`;
  }).join('');
  $('content').innerHTML = `<div class="clientgrid">${cards}</div>`;
}

// ---------- RENDER: client detail ----------
function renderClient(){
  const c=state.clients.find(x=>x.id===state.clientId); if(!c) return go('clients');
  const titles={overview:'Overview',prompts:'Prompts',explorer:'Prompt Explorer',answers:'All answers',actions:'Actions',competitors:'Competitor Analysis',perception:'AI Perception',sources:'Cited sources'};
  $('topbar').innerHTML = `<div><div class="crumb"><a onclick="go('clients')">Clients</a> / <b>${esc(c.name)}</b></div><div class="h1">${titles[state.tab]}</div></div>
    <div class="spacer"></div>
    ${filterControls(c.id)}
    <button class="btn ghost" title="Client settings" style="padding:8px 10px" onclick="clientSettingsModal('${c.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="width:16px;height:16px"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
    <button class="btn ghost" onclick="loadAndRender()">Refresh</button>
    <button class="btn" id="runBtn" onclick="runNow()" ${state.running?'disabled':''}>${state.running?'<span class="mini-spin"></span>Running…':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3l14 9-14 9V3z"/></svg>Run now'}</button>`;
  const tabbar = `<div class="tabs">`+
    ['overview','Overview','prompts','Prompts','explorer','Prompt Explorer','answers','Answers','actions','Actions','competitors','Competitor Analysis','perception','AI Perception','sources','Cited sources']
    .reduce((a,_,i,arr)=> i%2===0? a+`<button class="tab ${state.tab===arr[i]?'on':''}" onclick="setTab('${arr[i]}')">${arr[i+1]}</button>`:a,'')+`</div>`;
  let body='';
  if(state.tab==='overview') body=overviewHTML(c);
  else if(state.tab==='prompts') body=promptsHTML(c);
  else if(state.tab==='explorer') body=explorerHTML(c);
  else if(state.tab==='perception') body=perceptionHTML(c);
  else if(state.tab==='answers') body=answersHTML(c);
  else if(state.tab==='actions') body=actionsTabHTML(c);
  else if(state.tab==='competitors') body=competitorsHTML(c);
  else if(state.tab==='sources') body=sourcesHTML(c);
  const banner = state.running ? `<div class="runbanner"><span class="mini-spin"></span>Running a fresh check across ChatGPT + Claude. This takes about 2 to 3 minutes; results update here automatically.</div>` : '';
  $('content').innerHTML = tabbar + `<div style="padding-top:18px">${banner}${body}</div>`;
}

function overviewHTML(c){
  const rows=latestRows(c.id);
  if(!rows.length) return emptyClient();
  const s=summary(c.id);
  const dLbl=`${s.dayCount} day${s.dayCount>1?'s':''}`;
  const visSub = s.prevVis!=null
    ? `${s.unbMent} of ${s.unbTotal} buyer-intent answers · ${s.vis>=s.prevVis?'▲':'▼'} from ${s.prevVis}% prior ${state.windowDays}d`
    : `${s.unbMent} of ${s.unbTotal} buyer-intent answers over ${dLbl}`;
  const sovSub = s.rank ? `of ${s.totalBrands} brands named`
    : (s.totalBrands ? `not named · ${s.totalBrands} rivals seen` : 'no unbranded data');
  const uTot=s.usc.positive+s.usc.neutral+s.usc.negative;
  const repSub = s.brandedCount ? `${s.bsc.positive} pos · ${s.bsc.neutral} neu · ${s.bsc.negative} neg` : 'no branded prompts';
  const uSentSub = uTot ? `${s.usc.positive} pos · ${s.usc.neutral} neu · ${s.usc.negative} neg` : 'no unbranded mentions yet';
  const tiles = `<div class="eyebrow" style="margin-bottom:11px">Rolling ${state.windowDays}-day window · visibility on buyer-intent prompts · through ${esc(s.windowEnd||'')}</div><div class="tiles">
    ${tile('AI Visibility', s.unbTotal? s.vis+'%':'—', visSub, s.unbTotal&&s.vis<40?'var(--neg)':'var(--accent)', s.unbTotal&&s.vis<40?'var(--neg)':null)}
    ${tile('Share of voice', s.rank?('#'+s.rank):'—', sovSub, 'var(--s2)')}
    ${tile('Branded reputation', s.brandedCount? s.bSentLabel:'—', repSub, 'var(--neu)', null, 22)}
    ${tile('Sentiment when found', uTot? s.uSentLabel:'—', uSentSub, 'var(--pos)', null, 22)}
  </div>`;
  // share of voice table
  const board=s.board.slice(0,7);
  const sov = board.length? `<table><tbody>${board.map((b,i)=>{
    const me=b.n===c.name;
    return `<tr class="${me?'me':''}"><td class="rank tnum">${i+1}</td>
      <td><div class="brandcell"><span class="lg" style="background:${me?'var(--accent)':colorFor(b.n)}">${esc(initials(b.n))}</span>${esc(b.n)}</div></td>
      <td style="width:120px"><div style="display:flex;align-items:center;gap:8px"><div class="bar"><i style="width:${Math.round(b.c/s.denom*100)}%;background:${me?'var(--accent)':colorFor(b.n)}"></i></div><span class="tnum" style="font-size:12px;font-weight:600">${Math.round(b.c/s.denom*100)}%</span></div></td></tr>`;
  }).join('')}</tbody></table>` : `<div class="note">No unbranded prompts yet.</div>`;
  // prompt performance
  const models=[...new Set(rows.map(r=>r.model))];
  const perf = promptPerfTable(c, models);
  // latest answers
  const ans = rows.slice().sort((a,b)=> (a.client_mentioned===b.client_mentioned)?0:(a.client_mentioned?-1:1)).slice(0,5).map(r=>{
    const mb=MB(r.model), sc=SENTCHIP(r.sentiment);
    const snippet=(r.answer||'').replace(/\s+/g,' ').slice(0,180);
    return `<div class="ans clk" onclick="openPrompt('${c.id}','${encodeURIComponent(r.prompt_text)}')">
      <div class="top"><span class="modelbadge"><span class="m" style="background:${mb.c}">${mb.i}</span>${mb.n}</span>
      <span class="chip ${r.client_mentioned?'pos':'off'}">${r.client_mentioned?'Mentioned':'Absent'}</span>
      <span class="meta">${esc(r.run_date)}</span></div>
      <div class="pr">${esc(r.prompt_text)}</div><div class="txt">${esc(snippet)}…</div>
      <span class="viewcue">Read full answer${chev()}</span></div>`;
  }).join('');
  // source URLs (the actionable ones), over the active window
  const urls=aggUrlRows(windowRows(c.id, state.windowDays));
  const srcHTML = urls.length? urls.slice(0,8).map(urlRowHTML).join('') : `<div class="note">No source URLs captured yet.</div>`;
  return tiles +
    `<div class="grid two" style="grid-template-columns:1.4fr 1fr;margin-top:16px">
      <div class="card"><div class="hd"><div><h3>Prompt performance</h3><p>Where you win and lose, per model</p></div></div><div class="bd" style="overflow-x:auto">${perf}</div></div>
      <div class="card"><div class="hd"><div><h3>Share of voice</h3><p>Unbranded buyer prompts</p></div></div><div class="bd">${sov}</div></div>
    </div>
    <div class="grid two" style="grid-template-columns:1.4fr 1fr;margin-top:16px">
      <div class="card"><div class="hd"><div><h3>Latest AI answers</h3><p>Latest run · ${esc(rows[0].run_date)}</p></div><div class="spacer"></div><button class="btn ghost" style="padding:5px 11px;font-size:12px" onclick="setTab('answers')">View all ${chev()}</button></div><div class="bd">${ans}</div></div>
      <div class="card"><div class="hd"><div><h3>Source URLs</h3><p>Exact pages models pull from — get featured here</p></div><div class="spacer"></div><button class="btn ghost" style="padding:5px 11px;font-size:12px" onclick="setTab('sources')">View all ${chev()}</button></div><div class="bd">${srcHTML}</div></div>
    </div>`;
}
function tile(lab,val,sub,strip,valColor,fs){
  return `<div class="tile"><span class="strip" style="background:${strip}"></span>
    <div class="lab">${lab}</div><div class="val tnum" style="${valColor?'color:'+valColor+';':''}${fs?'font-size:'+fs+'px;margin-top:12px':''}">${esc(val)}</div><div class="sub">${esc(sub)}</div></div>`;
}
function promptPerfTable(c, models){
  const ps=clientPrompts(c.id);
  const rows=latestRows(c.id);
  const head=`<thead><tr><th>Prompt</th><th>Type</th>${models.map(m=>`<th>${MB(m).n}</th>`).join('')}<th>Sentiment</th></tr></thead>`;
  const byPrompt={};
  rows.forEach(r=>{ (byPrompt[r.prompt_text]=byPrompt[r.prompt_text]||{})[r.model]=r; });
  const texts=[...new Set([...ps.map(p=>p.text), ...Object.keys(byPrompt)])];
  const body=texts.map(t=>{
    const kind=promptKind(c.id,t);
    const cells=models.map(m=>{ const r=byPrompt[t]&&byPrompt[t][m];
      if(!r) return `<td><span class="chip off">—</span></td>`;
      return `<td><span class="chip ${r.client_mentioned?'pos':'off'}">${r.client_mentioned?(r.client_prominence==='featured'?'Featured':'Listed'):'Absent'}</span></td>`; }).join('');
    const anyR=byPrompt[t]?Object.values(byPrompt[t])[0]:null;
    const sc=SENTCHIP(anyR&&anyR.client_mentioned?bestSentiment(byPrompt[t]):null);
    return `<tr class="clk" onclick="openPrompt('${c.id}','${encodeURIComponent(t)}')"><td style="max-width:320px;font-weight:550">${esc(t)} <span class="viewcue">read${chev()}</span></td>
      <td><span class="chip ${kind==='branded'?'neu':'off'}">${kind}</span></td>${cells}<td><span class="chip ${sc[0]}">${sc[1]}</span></td></tr>`;
  }).join('');
  return `<table>${head}<tbody>${body}</tbody></table>`;
}
function bestSentiment(modelMap){
  const order={negative:0,neutral:1,positive:2}; let best=null;
  for(const r of Object.values(modelMap)){ if(r.sentiment&&(best===null||order[r.sentiment]<order[best])) best=r.sentiment; }
  return best;
}
function aggSources(rows){
  const cnt={}; let n=0;
  rows.forEach(r=>{ n++; new Set(r.cited_domains||[]).forEach(d=>cnt[d]=(cnt[d]||0)+1); });
  return Object.entries(cnt).map(([d,c])=>({d,p:Math.round(c/(n||1)*100)})).sort((a,b)=>b.p-a.p);
}
function srcLine(s){return `<div class="srcline"><span class="fav">${esc((s.d||'?')[0].toUpperCase())}</span><span class="dom">${esc(s.d)}</span>
  <div class="bar" style="flex:1;max-width:150px"><i style="width:${s.p}%"></i></div><span class="pct tnum">${s.p}%</span></div>`;}
function emptyClient(){return `<div class="note" style="max-width:560px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/></svg>No results yet. This client will get data after the next daily run (6am ET), or its prompts were just added. Add prompts in the Prompts tab.</div>`;}

function promptsHTML(c){
  const ps=clientPrompts(c.id);
  const rows=latestRows(c.id);
  const byPrompt=groupBy(rows,'prompt_text');
  const groups={branded:[],unbranded:[]};
  ps.forEach(p=>groups[p.kind==='branded'?'branded':'unbranded'].push(p));
  function grp(title,arr){ if(!arr.length) return '';
    const body=arr.map(p=>{
      const rs=byPrompt[p.text]||[]; const vis=rs.length?Math.round(rs.filter(r=>r.client_mentioned).length/rs.length*100):null;
      return `<tr class="clk" onclick="openPrompt('${c.id}','${encodeURIComponent(p.text)}')"><td style="max-width:340px;font-weight:550">${esc(p.text)} <span class="viewcue">read${chev()}</span></td>
        <td class="tnum">${vis==null?'—':vis+'%'}</td><td><span class="chip pos dot" style="font-size:10.5px">Active</span></td>
        <td style="width:38px;text-align:right"><button class="rowbtn" title="Delete prompt" onclick="event.stopPropagation();deletePrompt('${p.id}')">${trashIcon()}</button></td></tr>`;
    }).join('');
    return `<div class="promptgroup">${title}</div><table><thead><tr><th>Prompt</th><th>Visibility</th><th>Status</th><th></th></tr></thead><tbody>${body}</tbody></table>`;
  }
  return `<div style="display:flex;align-items:center;margin-bottom:10px"><div class="eyebrow">${ps.length} prompts · ${new Set(rows.map(r=>r.model)).size||0} models</div><div class="spacer"></div>
    <button class="btn" onclick="addPromptModal('${c.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12h14"/></svg>Add prompt</button></div>
    <div class="card"><div class="bd" style="padding-top:6px">${ps.length?(grp('Unbranded · buyer intent',groups.unbranded)+grp('Branded · reputation',groups.branded)):'<div class="note">No prompts yet. Add the searches you want to track.</div>'}</div></div>
    <div style="margin-top:26px;padding-top:16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:12px">
      <div><div style="font-weight:600;font-size:13px">Danger zone</div><div style="font-size:12px;color:var(--faint)">Deleting a client removes all of its prompts and history permanently.</div></div>
      <div class="spacer"></div>
      <button class="btn danger" onclick="deleteClient('${c.id}')">${trashIcon()}Delete client</button></div>`;
}
function lineChart(series, labels){
  const W=760,H=220,pl=34,pr=14,pt=14,pb=26; const vals=series.flatMap(s=>s.data.filter(v=>v!=null));
  const max=Math.max(20,...vals); const iw=W-pl-pr, ih=H-pt-pb, n=labels.length;
  const x=i=> n<=1? pl+iw/2 : pl+iw*i/(n-1);
  const y=v=> pt+ih*(1-(v||0)/max);
  let svg=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto" preserveAspectRatio="xMidYMid meet">`;
  const T=4;
  for(let t=0;t<=T;t++){ const val=Math.round(max*t/T), yy=y(val);
    svg+=`<line x1="${pl}" y1="${yy}" x2="${W-pr}" y2="${yy}" stroke="var(--border)" stroke-width="1"/>`;
    svg+=`<text x="${pl-6}" y="${yy+3.5}" text-anchor="end" font-size="9" fill="var(--faint)" font-family="var(--font-mono)">${val}%</text>`; }
  labels.forEach((d,i)=>{ if(n>8 && i%2) return; svg+=`<text x="${x(i)}" y="${H-8}" text-anchor="middle" font-size="9" fill="var(--faint)" font-family="var(--font-mono)">${esc(d.slice(5))}</text>`; });
  series.forEach(s=>{ const pts=s.data.map((v,i)=>v==null?null:`${x(i)},${y(v)}`).filter(Boolean).join(' ');
    if(pts) svg+=`<polyline points="${pts}" fill="none" stroke="${s.color}" stroke-width="${s.color==='var(--accent)'?2.6:1.8}" stroke-linejoin="round" stroke-linecap="round"/>`;
    const lv=s.data[n-1]; if(lv!=null) svg+=`<circle cx="${x(n-1)}" cy="${y(lv)}" r="3.2" fill="${s.color}"/>`; });
  return svg+`</svg>`;
}
function competitorsHTML(c){
  const rows=windowRows(c.id, state.windowDays).filter(r=>promptKind(c.id,r.prompt_text)!=='branded');
  if(!rows.length) return `<div class="note">No competitor data yet. It fills in from the brands the AIs name on your unbranded prompts.</div>`;
  const denom=rows.length;
  const cnt={};
  rows.forEach(r=>{ const s=new Set([...(r.other_brands||[]),...(r.competitors_mentioned||[])]); if(r.client_mentioned) s.add(c.name);
    s.forEach(b=>{ cnt[b]=(cnt[b]||0)+1; }); });
  const board=Object.entries(cnt).map(([n,x])=>({n,c:x,vis:Math.round(x/denom*100)})).sort((a,b)=>b.c-a.c);
  let top=board.slice(0,5);
  const meRow=board.find(b=>b.n===c.name);
  if(meRow && !top.find(b=>b.n===c.name)) top=[...top.slice(0,4), meRow];
  const dates=[...new Set(rows.map(r=>r.run_date))].sort();
  const dayVis=(name,d)=>{ const dr=rows.filter(r=>r.run_date===d); if(!dr.length) return null; let m=0;
    dr.forEach(r=>{ const s=new Set([...(r.other_brands||[]),...(r.competitors_mentioned||[])]); if(r.client_mentioned) s.add(c.name); if(s.has(name)) m++; }); return Math.round(m/dr.length*100); };
  const series=top.map((b,i)=>({name:b.n, color: b.n===c.name?'var(--accent)':PALETTE[(i+1)%PALETTE.length], data:dates.map(d=>dayVis(b.n,d))}));
  const chart = dates.length>1 ? lineChart(series,dates) : `<div class="note">Need 2+ days of data for the trend, check back after the next run.</div>`;
  const legend = `<div class="legend" style="margin-top:12px">${series.map(s=>`<span><i style="background:${s.color}"></i>${esc(s.name)}</span>`).join('')}</div>`;
  const table=`<table><thead><tr><th>#</th><th>Brand</th><th>Visibility</th><th>Share of voice</th></tr></thead><tbody>${board.slice(0,15).map((b,i)=>{ const mine=b.n===c.name;
    return `<tr class="${mine?'me':''}"><td class="rank tnum">${i+1}</td><td><div class="brandcell"><span class="lg" style="background:${mine?'var(--accent)':colorFor(b.n)}">${esc(initials(b.n))}</span>${esc(b.n)}${mine?' <span class="chip pos" style="font-size:10px;padding:1px 7px">you</span>':''}</div></td>
      <td class="tnum" style="font-weight:600">${b.vis}%</td>
      <td style="width:170px"><div style="display:flex;align-items:center;gap:8px"><div class="bar" style="max-width:120px"><i style="width:${b.vis}%;background:${mine?'var(--accent)':colorFor(b.n)}"></i></div><span class="tnum" style="font-size:12px">${b.vis}%</span></div></td></tr>`;}).join('')}</tbody></table>`;
  return `<div class="eyebrow" style="margin-bottom:12px">You vs. competitors · unbranded prompts · last ${state.windowDays} days</div>
    <div class="card"><div class="hd"><div><h3>Visibility over time</h3><p>Share of AI answers naming each brand (${esc(c.name)} in blue)</p></div></div><div class="bd">${chart}${legend}</div></div>
    <div class="card" style="margin-top:16px"><div class="hd"><div><h3>Ranking</h3><p>Every brand the models name on your prompts</p></div></div><div class="bd" style="overflow-x:auto">${table}</div></div>`;
}
function srcHost(u){ try{return new URL(u).hostname.replace(/^www\./,'');}catch{return u;} }
// Per-URL: how many answers used it (Used), avg times cited per answer (Avg),
// and whether the client is mentioned in answers that cite it (Mentions).
function aggUrlRows(rows){
  const map={};
  rows.forEach(r=>{
    const list=r.cited_urls||[]; if(!list.length) return;
    const cnt={}; list.forEach(u=>{cnt[u]=(cnt[u]||0)+1;});
    const cm=!!r.client_mentioned;
    Object.keys(cnt).forEach(u=>{ const m=map[u]||(map[u]={u,used:0,total:0,client:false});
      m.used++; m.total+=cnt[u]; if(cm) m.client=true; });
  });
  return Object.values(map).map(m=>({u:m.u,used:m.used,avg:m.total/m.used,client:m.client})).sort((a,b)=>b.used-a.used||b.avg-a.avg);
}
function urlTitleCell(u){
  const host=srcHost(u);
  return `<div style="display:flex;align-items:center;gap:9px;min-width:0;flex:1"><span class="fav">${esc((host[0]||'?').toUpperCase())}</span>
    <a class="urllink" href="${esc(u)}" target="_blank" rel="noopener" title="${esc(u)}"><b>${esc(host)}</b><span>${esc(u.replace(/^https?:\/\//,''))}</span></a></div>`;
}
function brandTag(name){ return `<span class="lg" style="width:20px;height:20px;font-size:9px;background:${colorFor(name)}" title="${esc(name)}">${esc(initials(name))}</span>`; }
// Real page-content brand detection (from the crawl); falls back to the
// answer-derived client proxy for pages not yet crawled.
function mentionsCell(url, clientName, clientProxy){
  const brands = state.srcMentions[url];
  if(brands===undefined) return clientProxy? brandTag(clientName) : '<span style="color:var(--faint)">—</span>';
  if(!brands.length) return '<span style="color:var(--faint)">—</span>';
  const cl = clientName ? brands.find(b=>b.toLowerCase()===clientName.toLowerCase()) : null;
  const others = brands.filter(b=>b!==cl);
  const chips=[]; if(cl) chips.push(brandTag(clientName));
  others.slice(0, cl?1:2).forEach(b=>chips.push(brandTag(b)));
  const extra = brands.length - chips.length;
  return `<div style="display:flex;align-items:center;gap:4px;justify-content:center">${chips.join('')}${extra>0?`<span style="font-size:11px;color:var(--faint);font-weight:600">+${extra}</span>`:''}</div>`;
}
function urlTableHTML(rows, clientName){
  const list=aggUrlRows(rows);
  if(!list.length) return `<div class="note">No source URLs captured.</div>`;
  const body=list.slice(0,40).map(s=>`<tr>
    <td>${urlTitleCell(s.u)}</td>
    <td style="text-align:center;width:82px">${mentionsCell(s.u, clientName, s.client)}</td>
    <td class="tnum" style="text-align:right;width:52px;font-weight:600">${s.used}</td>
    <td class="tnum" style="text-align:right;width:92px;color:var(--muted)">${s.avg.toFixed(1)}</td></tr>`).join('');
  return `<table><thead><tr><th>URL</th><th style="text-align:center">Mentions</th><th style="text-align:right">Used</th><th style="text-align:right">Avg. citations</th></tr></thead><tbody>${body}</tbody></table>`;
}
// compact single-line rows for narrow cards (overview)
function urlRowHTML(s){
  return `<div class="urlrow">${urlTitleCell(s.u)}<span class="tnum" style="color:var(--muted);font-size:12px;font-weight:600;white-space:nowrap;flex:none">${s.used} used · ${s.avg.toFixed(1)} avg</span></div>`;
}
function sourcesPanels(rows, scope, clientName){
  const dom=aggSources(rows);
  const domHTML=dom.length? dom.slice(0,25).map(srcLine).join('') : `<div class="note">No citations captured.</div>`;
  return `<div class="grid two" style="grid-template-columns:1fr 1.7fr">
    <div class="card"><div class="hd"><div><h3>Domain sources</h3><p>How often each domain is cited ${scope}</p></div></div><div class="bd">${domHTML}</div></div>

// full chronological feed of every answer
function answersHTML(c){
  const rows=viewResults(c.id);   // respects the active model filter
  if(!rows.length) return emptyClient();
  const byDate=groupBy(rows,'run_date');
  const dates=Object.keys(byDate).sort().reverse();
  const feed=dates.map(d=>{
    const day=byDate[d].slice().sort((a,b)=> (a.prompt_text+a.model).localeCompare(b.prompt_text+b.model));
    return `<div class="promptgroup">${esc(d)} &middot; ${day.length} answers</div>`+
      day.map(r=>{ const mb=MB(r.model); const snip=(r.answer||'').replace(/\s+/g,' ').slice(0,140);
        return `<div class="ans clk" onclick="openPrompt('${c.id}','${encodeURIComponent(r.prompt_text)}')">
          <div class="top"><span class="modelbadge"><span class="m" style="background:${mb.c}">${mb.i}</span>${mb.n}</span>
          <span class="chip ${r.client_mentioned?'pos':'off'}">${r.client_mentioned?'Mentioned':'Absent'}</span>
          <span class="meta">${esc(r.prompt_text)}</span></div>
          <div class="txt">${esc(snip)}…</div><span class="viewcue">Open history${chev()}</span></div>`;
      }).join('');
  }).join('');
  return `<div class="card"><div class="hd"><div><h3>All answers</h3><p>Every captured answer, newest first · click any to see that prompt over time</p></div></div><div class="bd">${feed}</div></div>`;
}
function fmtAnswer(t){
  t=esc(t);
  t=t.replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  t=t.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  t=t.replace(/\s{2,}/g,'\n').replace(/\s-\s/g,'\n• ');
  return t.split('\n').map(l=>{l=l.trim();if(!l)return'';
    if(/^##/.test(l))return '<h4>'+l.replace(/^#+\s*/,'')+'</h4>';
    if(/^•/.test(l))return '<div class="li">'+l.replace(/^•\s*/,'')+'</div>';
    return '<p>'+l+'</p>';}).join('');
}

  } else { toast('Moved to '+((COLS.find(x=>x[0]===status)||[])[1]||status)); }
};
window.addComment=async function(id){
  const el=$('cmt-input'); const body=(el.value||'').trim(); if(!body)return;
  const {error}=await sb.from('action_comments').insert({action_id:id, author: state.userEmail||'', body});
  if(error){toast('Error: '+error.message);return;}
  const c=await sb.from('action_comments').select('*').eq('action_id',id).order('created_at');
  renderActionDetail(id, c.data||[]);
};
window.deleteAction=async function(id){ if(!confirm('Delete this action?'))return; const {error}=await sb.from('actions').delete().eq('id',id); if(error){toast('Error: '+error.message);return;} closeModal(); toast('Deleted'); await loadAll(); render(); };
window.genActions=async function(cid){
  if(state.genRunning) return;
  const {error}=await sb.rpc('trigger_actions',{p_client:cid});
  if(error){ toast('Could not start: '+error.message); return; }
  state.genRunning=true; toast('Generating recommendations'); render();
  const before=clientActions(cid)[0]?.created_at||'';
  const started=Date.now();
  const timer=setInterval(async ()=>{
    await loadAll();
    const newest=clientActions(cid)[0]?.created_at||'';
    if(newest>before){ clearInterval(timer); state.genRunning=false; render(); toast('New recommendations added'); return; }
    if(Date.now()-started>110000){ clearInterval(timer); state.genRunning=false; render(); toast('Done. If nothing new appeared, your gaps are already covered.'); }
  }, 9000);
};

// ---------- PROMPT EXPLORER ----------
function explorerHTML(c){
  const sug=clientSuggestions(c.id);
  const genBtn=`<button class="btn" onclick="genInsights('${c.id}')" ${state.insightsRunning?'disabled':''}>${state.insightsRunning?'<span class="mini-spin"></span>Working…':compassIcon()+'Generate prompt ideas'}</button>`;
  const intro=`<div style="display:flex;align-items:center;margin-bottom:14px"><div><div style="font-weight:600;font-size:13.5px">Prompt Explorer</div><div style="font-size:12.5px;color:var(--faint);max-width:640px">Buyer queries in this client's space worth tracking, ranked by how commonly they're searched. Add the ones that matter.</div></div><div class="spacer"></div>${genBtn}</div>`;
  const banner=state.insightsRunning?`<div class="runbanner"><span class="mini-spin"></span>Mapping topics and prompts for this client's niche. About a minute.</div>`:'';
  if(!sug.length) return intro+banner+`<div class="note" style="max-width:560px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/></svg>No prompt ideas yet. Click "Generate prompt ideas" to map this client's space.</div>`;
  const tracked=new Set(clientPrompts(c.id).map(p=>p.text.toLowerCase()));
  const groups={}; sug.forEach(s=>{ (groups[s.category||'Other']=groups[s.category||'Other']||[]).push(s); });
  const body=Object.entries(groups).map(([cat,items])=>`<div class="promptgroup">${esc(cat)}</div>
    <table><thead><tr><th>Prompt</th><th>Volume</th><th></th></tr></thead><tbody>${items.map(s=>{
      const added = s.added || tracked.has((s.prompt_text||'').toLowerCase());
      return `<tr><td style="max-width:420px;font-weight:550">${esc(s.prompt_text)}${s.topic?`<div style="font-size:11px;color:var(--faint);margin-top:2px">${esc(s.topic)}</div>`:''}</td>
        <td style="width:110px"><div style="display:flex;align-items:center;gap:8px"><div class="bar" style="max-width:60px"><i style="width:${Math.min(100,s.volume||0)}%"></i></div><span class="tnum" style="font-size:12px">${s.volume||0}</span></div></td>
        <td style="width:90px;text-align:right">${added?'<span class="chip pos dot" style="font-size:10.5px">Tracking</span>':`<button class="btn" style="padding:5px 12px" onclick="addSuggestion('${s.id}')">Add</button>`}</td></tr>`;
    }).join('')}</tbody></table>`).join('');
  return intro+banner+`<div class="card"><div class="bd" style="padding-top:6px">${body}</div></div>`;
}
window.addSuggestion=async function(sugId){
  const s=(state.suggestions||[]).find(x=>x.id===sugId); if(!s) return;
  const c=state.clients.find(x=>x.id===s.client_id); const aliases=(c&&c.aliases)||[];
  const ins=await sb.from('prompts').insert({client_id:s.client_id,text:s.prompt_text,kind: aliases.some(a=>s.prompt_text.toLowerCase().includes(a.toLowerCase()))?'branded':'unbranded'});
  if(ins.error){ toast('Error: '+ins.error.message); return; }
  await sb.from('prompt_suggestions').update({added:true}).eq('id',sugId);
  toast('Added to tracking, running it now'); await loadAll(); render(); startRun(s.client_id);
};
window.genInsights=async function(cid){
  if(state.insightsRunning) return;
  const {error}=await sb.rpc('trigger_insights',{p_client:cid});
  if(error){ toast('Could not start: '+error.message); return; }
  state.insightsRunning=true; toast('Generating insights'); render();
  const beforeS=clientSuggestions(cid).length, beforeP=!!clientPerception(cid);
  const started=Date.now();
  const timer=setInterval(async ()=>{
    await loadAll();
    if(clientSuggestions(cid).length>beforeS || (!beforeP && clientPerception(cid))){ clearInterval(timer); state.insightsRunning=false; render(); toast('Insights updated'); return; }
    if(Date.now()-started>150000){ clearInterval(timer); state.insightsRunning=false; render(); toast('Done, or taking longer than usual.'); }
  }, 9000);
};

// ---------- AI PERCEPTION ----------
// per-model visibility + sentiment over the active window, across ALL models
// (ignores the model filter on purpose — the scoreboard is a comparison).
function modelStats(cid){
  const all=clientResults(cid); if(!all.length) return [];
  const md=all.reduce((m,r)=>r.run_date>m?r.run_date:m, all[0].run_date);
  const start=shiftDate(md,-(state.windowDays-1));
  const win=all.filter(r=>r.run_date>=start && r.run_date<=md);
  return Object.entries(groupBy(win,'model')).map(([m,rs])=>{
    const unb=rs.filter(r=>promptKind(cid,r.prompt_text)!=='branded');  // visibility = unbranded
    const ment=unb.filter(r=>r.client_mentioned).length;
    const sc={positive:0,neutral:0,negative:0}; rs.forEach(r=>{ if(r.client_mentioned&&sc[r.sentiment]!=null) sc[r.sentiment]++; });  // sentiment from all mentions
    return {m,total:unb.length,ment,vis:unb.length?Math.round(ment/unb.length*100):0,sc};
  }).sort((a,b)=>b.vis-a.vis||b.ment-a.ment);
}
function modelScoreboard(stats){
  if(!stats.length) return '';
  const best=stats[0], worst=stats[stats.length-1];
  const cards=stats.map(s=>{ const mb=MB(s.m);
    const tag = (stats.length>1 && s.vis>0 && s===best) ? `<span class="mt-tag" style="color:var(--pos);background:var(--pos-weak)">Likes you most</span>`
      : (stats.length>1 && s===worst && worst.vis<best.vis) ? `<span class="mt-tag" style="color:var(--neg);background:var(--neg-weak)">Weakest</span>` : '';
    const sent = s.ment ? `${s.sc.positive?'<span class="chip pos" style="font-size:10px;padding:1px 7px">'+s.sc.positive+' pos</span>':''}${s.sc.negative?' <span class="chip neg" style="font-size:10px;padding:1px 7px">'+s.sc.negative+' neg</span>':''}` : '';
    return `<div class="mtile">${tag}<div class="mt-top"><span class="modelbadge"><span class="m" style="background:${mb.c}">${mb.i}</span>${mb.n}</span></div>
      <div class="mt-vis tnum" style="color:${s.vis>=50?'var(--pos)':s.vis>0?'var(--text)':'var(--faint)'}">${s.vis}%</div>
      <div class="mt-sub">${s.ment}/${s.total} buyer-intent answers</div>
      <div style="margin-top:8px;display:flex;gap:5px;flex-wrap:wrap">${sent||'<span class="chip off" style="font-size:10px;padding:1px 7px">no mentions</span>'}</div></div>`;
  }).join('');
  return `<div class="mscore">${cards}</div>`;
}
function modelReadCard(m, d, statsMap){
  const mb=MB(m), st=statsMap[m], stance=((d&&d.stance)||'').toLowerCase();
  const chip = stance==='strong'?['pos','Strong fit']:stance==='mixed'?['neu','Mixed']:stance==='weak'?['neu','Weak']:['off','Absent'];
  return `<div class="card"><div class="hd"><div style="display:flex;align-items:center;gap:9px;flex-wrap:wrap"><span class="modelbadge"><span class="m" style="background:${mb.c}">${mb.i}</span>${mb.n}</span><span class="chip ${chip[0]}">${chip[1]}</span>${st?`<span style="font-size:11.5px;color:var(--faint)">${st.vis}% · ${st.ment}/${st.total}</span>`:''}</div></div>
    <div class="bd"><div class="mread-lab">What it values</div><div class="mread-txt">${esc((d&&d.values)||'—')}</div>
      <div class="mread-lab" style="margin-top:12px">How to show up more here</div><div class="mread-txt">${esc((d&&d.recommendation)||'—')}</div></div></div>`;
}
function perceptionHTML(c){
  const p=clientPerception(c.id);
  const bm=(p&&p.by_model)||{};
  const stats=modelStats(c.id); const statsMap={}; stats.forEach(s=>statsMap[s.m]=s);
  const genBtn=`<button class="btn ghost" onclick="genInsights('${c.id}')" ${state.insightsRunning?'disabled':''}>${state.insightsRunning?'<span class="mini-spin"></span>Working…':'Regenerate'}</button>`;
  const banner=state.insightsRunning?`<div class="runbanner"><span class="mini-spin"></span>Reading how each model describes this brand.</div>`:'';
  // sentiment over time (respects the model filter)
  const rows=windowRows(c.id, state.windowDays).filter(r=>r.client_mentioned);
  const dates=[...new Set(rows.map(r=>r.run_date))].sort();
  const score=d=>{ const dr=rows.filter(r=>r.run_date===d); if(!dr.length) return null; const map={positive:100,neutral:55,negative:5};
    const vals=dr.map(r=>map[r.sentiment]).filter(v=>v!=null); return vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length):null; };
  const chart = dates.length>1 ? lineChart([{name:'Sentiment',color:'var(--accent)',data:dates.map(score)}], dates) : '';
  const sc={positive:0,neutral:0,negative:0}; rows.forEach(r=>{ if(sc[r.sentiment]!=null) sc[r.sentiment]++; });
  const distro=`<div style="display:flex;gap:8px;margin-top:6px"><span class="chip pos">${sc.positive} positive</span><span class="chip neu">${sc.neutral} neutral</span><span class="chip neg">${sc.negative} negative</span></div>`;
  const sentCard=`<div class="card"><div class="hd"><div><h3>Sentiment over time</h3><p>How favorably the models talk about ${esc(c.name)} when mentioned</p></div></div><div class="bd">${chart||'<div class="note">Not enough mentions yet for a trend.</div>'}${distro}</div></div>`;

  const header=`<div style="display:flex;align-items:center;margin-bottom:14px"><div class="eyebrow">How AI perceives ${esc(c.name)}${p&&p.generated_at?' · updated '+fmtDate(p.generated_at):''}</div><div class="spacer"></div>${genBtn}</div>`;
  const scoreboard = stats.length? `<div class="eyebrow" style="margin-bottom:9px">Which models surface you · last ${state.windowDays} days</div>${modelScoreboard(stats)}` : '';

  // focused single-model view when a specific model is picked in the top filter
  const fm=state.modelFilter;
  if(fm!=='all'){
    const focus = bm[fm] ? modelReadCard(fm, bm[fm], statsMap)
      : `<div class="note" style="max-width:560px">No per-model read for ${esc(MB(fm).n)} yet. Click Regenerate${p?'':' after generating perception'}.</div>`;
    return header+banner+scoreboard+
      `<div style="font-size:12px;color:var(--faint);margin:2px 0 10px">Showing ${esc(MB(fm).n)}. Switch the model filter to “All models” to compare every assistant.</div>`+
      focus+`<div style="margin-top:16px">${sentCard}</div>`;
  }

  // all-models view: per-model read cards ordered by the scoreboard
  const modelKeys=stats.map(s=>s.m).filter(m=>bm[m]).concat(Object.keys(bm).filter(m=>!statsMap[m]));
  const perModel = modelKeys.length? `<div class="eyebrow" style="margin:20px 0 9px">What each model rewards, and how to win it</div><div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(300px,1fr))">${modelKeys.map(m=>modelReadCard(m,bm[m],statsMap)).join('')}</div>` : '';

  if(!p) return header+banner+scoreboard+`<div class="note" style="max-width:560px;margin-bottom:16px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/></svg>No perception write-up yet. Click Regenerate to have Claude read how each model treats ${esc(c.name)}.</div>${sentCard}`;

  const listItems=(arr,cls)=>arr.map(x=>`<div class="adet-must"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:${cls}"><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16h.01"/></svg><div>${esc(x)}</div></div>`).join('');
  return header+banner+scoreboard+
    `<div class="card" style="margin-bottom:16px"><div class="bd"><div style="font-size:14px;line-height:1.6">${esc(p.summary||'')}</div>
      ${(p.keywords||[]).length?`<div style="display:flex;flex-wrap:wrap;gap:7px;margin-top:14px">${(p.keywords||[]).map(k=>`<span class="dchip">${esc(k)}</span>`).join('')}</div>`:''}</div></div>
    <div class="grid two" style="grid-template-columns:1fr 1fr;margin-bottom:16px">
      <div class="card"><div class="hd"><div><h3 style="color:var(--pos)">Strengths</h3><p>What the models credit you for</p></div></div><div class="bd">${listItems(p.strengths||[],'var(--pos)')||'<div class="note">None noted.</div>'}</div></div>
      <div class="card"><div class="hd"><div><h3 style="color:var(--neg)">Concerns</h3><p>Hesitations the models raise</p></div></div><div class="bd">${listItems(p.concerns||[],'var(--neg)')||'<div class="note">None noted.</div>'}</div></div>
    </div>${perModel}<div style="margin-top:16px">${sentCard}</div>`;
}

// ---------- ROUTER ----------
function filterControls(cid){
  const have=clientModels(cid);   // models that actually have data for this client
  const opts=`<option value="all"${state.modelFilter==='all'?' selected':''}>All models</option>`+
    CANON_MODELS.map(m=>{ const on=have.includes(m);
      const suffix = on ? '' : (LIVE_MODELS.includes(m) ? ' (no data yet)' : ' (no key)');
      return `<option value="${m}"${state.modelFilter===m?' selected':''}${on?'':' disabled'}>${MB(m).n}${suffix}</option>`;}).join('');
  const seg=`<div class="seg">${[7,14,30].map(d=>`<button class="${state.windowDays===d?'on':''}" onclick="setWindow(${d})">${d}d</button>`).join('')}</div>`;
  return seg+`<select class="fsel" onchange="setModel(this.value)">${opts}</select>`;
}
window.setWindow=function(d){ state.windowDays=d; render(); };
window.setModel=function(m){ state.modelFilter=m; render(); };
window.go=function(v){ state.view=v; if(v==='clients'){state.clientId=null; state.modelFilter='all';} render(); };
window.openClient=function(id){ state.view='client'; state.clientId=id; state.tab='overview'; render(); };
window.setTab=function(t){ state.view='client'; state.tab=t; render(); };
function render(){ renderNav();
  if(state.view==='clients') renderClients();
  else if(state.view==='prompt') renderPromptPage();
  else renderClient();
  window.scrollTo(0,0);
}
function renderPromptPage(){
  const c=state.clients.find(x=>x.id===state.clientId); if(!c) return go('clients');
  const text=state.promptText;
  // rows for this prompt within the active window + model filter, grouped by day
  const wrows=windowRows(c.id, state.windowDays).filter(r=>r.prompt_text===text);
  const byDate=groupBy(wrows,'run_date');
  const hist=Object.keys(byDate).sort().reverse().map(d=>({date:d, rows:byDate[d].sort((a,b)=>a.model.localeCompare(b.model))}));
  $('topbar').innerHTML=`<div style="min-width:0"><div class="crumb"><a onclick="go('clients')">Clients</a> / <a onclick="openClient('${c.id}')">${esc(c.name)}</a> / <b>Prompt history</b></div><div class="h1">${esc(text)}</div></div>
    <div class="spacer"></div>
    ${filterControls(c.id)}
    <button class="btn ghost" onclick="openClient('${c.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg> Back</button>`;
  if(!hist.length){ $('content').innerHTML=`<div class="note">No results for this prompt in the selected window / model.</div>`; return; }
  const latest=hist[0], lm=latest.rows.filter(r=>r.client_mentioned).length;
  const strip=hist.slice().reverse().map(d=>{ const m=d.rows.filter(r=>r.client_mentioned).length, t=d.rows.length;
    const pct=t?Math.round(m/t*100):0; const col=pct>0?'var(--pos)':'var(--border)';
    return `<div title="${esc(d.date)}: ${m}/${t}" style="flex:1;min-width:14px;display:flex;flex-direction:column;align-items:center;gap:4px">
      <div style="width:100%;height:${Math.max(6,pct*0.5)}px;min-height:6px;background:${col};border-radius:3px"></div>
      <div style="font-size:9px;color:var(--faint);font-family:var(--font-mono)">${esc(d.date.slice(5))}</div></div>`;}).join('');
  const days=hist.map((day,i)=>
    `<div class="dayhead"><span>${esc(day.date)}</span>${i===0?'<span class="daynow">latest</span>':''}<span class="daycount">${day.rows.filter(r=>r.client_mentioned).length}/${day.rows.length} mentioned</span></div>`
    + day.rows.map(answerCard).join('')
  ).join('');
  // per-prompt sources over the window
  const domSrc=aggSources(wrows);
  const domHTML = domSrc.length? domSrc.slice(0,15).map(srcLine).join('') : `<div class="note">No citations captured.</div>`;
  const urlHTML = urlTableHTML(wrows, c.name);
  $('content').innerHTML=`
    <div class="tiles" style="grid-template-columns:repeat(3,1fr);max-width:640px">
      ${tile('Days tracked', String(hist.length), `last ${state.windowDays} days`, 'var(--accent)')}
      ${tile('Latest', `${lm}/${latest.rows.length}`, `mentioned on ${esc(latest.date)}`, lm?'var(--pos)':'var(--neg)')}
      ${tile('Prompt type', promptKind(c.id,text)==='branded'?'Branded':'Unbranded', 'buyer intent', 'var(--s2)')}
    </div>
    <div class="card" style="margin-top:16px"><div class="hd"><div><h3>Mention rate over time</h3><p>Share of models mentioning ${esc(c.name)} each day</p></div></div>
      <div class="bd"><div style="display:flex;gap:6px;align-items:flex-end;height:80px">${strip}</div></div></div>
    <div class="grid two" style="grid-template-columns:1fr 1.4fr;margin-top:16px">
      <div class="card"><div class="hd"><div><h3>Domain sources</h3><p>How often each domain is cited on this prompt</p></div></div><div class="bd">${domHTML}</div></div>
      <div class="card"><div class="hd"><div><h3>Source URLs</h3><p>Exact pages the models pulled from</p></div></div><div class="bd">${urlHTML}</div></div>
    </div>
    <div class="card" style="margin-top:16px"><div class="hd"><div><h3>Every answer over time</h3><p>Newest first, grouped by day</p></div></div>
      <div class="bd phist">${days}</div></div>`;
}
window.loadAndRender=async function(){ await loadAll(); render(); };
window.runNow=function(){ startRun(state.clientId); };
async function startRun(cid){
  if(state.running || !cid) return;
  const { error } = await sb.rpc('trigger_run', { p_client: cid });
  if(error){ toast('Could not start run: '+error.message); return; }
  state.running=true;
  const sinceIso = new Date(Date.now()-8000).toISOString();
  toast('Running the prompts now — about 1-2 minutes');
  render();
  pollRun(sinceIso, Date.now());
}
function pollRun(sinceIso, started){
  const timer=setInterval(async ()=>{
    if(Date.now()-started > 6*60*1000){ clearInterval(timer); state.running=false; render(); toast('Run is taking longer than usual — hit Refresh shortly.'); return; }
    const { data } = await sb.from('runs').select('id,created_at').gt('created_at', sinceIso).order('created_at',{ascending:false}).limit(1);
    if(data && data.length){
      clearInterval(timer);
      await new Promise(r=>setTimeout(r,2500));
      await loadAll(); state.running=false; render(); toast('Results updated');
    }
  }, 8000);
}

document.addEventListener('keydown',e=>{ if(e.key==='Escape'){closeDrawer();closeModal();} });

// ---------- BOOT ----------
async function boot(){
  $('loading').classList.remove('hide');
  const { data:{ session } } = await sb.auth.getSession();
  if(!session){ $('loading').classList.add('hide'); $('auth').classList.remove('hide'); return; }
  const email=session.user.email||''; state.userEmail=email;
  $('uemail').textContent=email; $('uav').textContent=(email[0]||'?').toUpperCase();
  await loadAll();
  $('loading').classList.add('hide'); $('app').classList.remove('hide');
  render();
}
sb.auth.onAuthStateChange((event)=>{ if(event==='SIGNED_IN' && $('app').classList.contains('hide')) boot(); });
boot();
</script>
